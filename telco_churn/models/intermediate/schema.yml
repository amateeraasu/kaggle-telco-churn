version: 2

models:
  - name: int_churn_features
    description: >
      Intermediate model: all feature engineering for the churn prediction model.
      Extends stg_customers with derived business features. The ML notebook reads
      from fct_churn_features (which selects from this model) — no feature
      engineering happens in Python.
    columns:
      - name: customer_id
        description: Row identifier (pass-through from staging)
        tests:
          - not_null
          - unique

      - name: tenure_group
        description: >
          Tenure bucketed into churn-risk cohorts (0-12 mo, 12-24 mo, 24-48 mo, 48+ mo).
          Churn risk is highest in the first year and non-linear across the full range.
        tests:
          - not_null
          - accepted_values:
              values: ["0-12 mo", "12-24 mo", "24-48 mo", "48+ mo"]

      - name: contract_risk_score
        description: >
          Ordinal encoding of contract commitment level.
          Month-to-month=3 (highest risk), One year=2, Two year=1 (lowest risk).
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3]

      - name: charges_ratio
        description: >
          Monthly charges divided by tenure_months. Measures cost intensity
          relative to loyalty duration. NULL when tenure_months = 0.

      - name: service_count
        description: >
          Count of internet add-on services (0–6): OnlineSecurity, OnlineBackup,
          DeviceProtection, TechSupport, StreamingTV, StreamingMovies.
          Each additional service raises switching costs.
        tests:
          - not_null

      - name: has_any_streaming
        description: 1 if customer subscribes to StreamingTV or StreamingMovies, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_any_security
        description: 1 if customer subscribes to OnlineSecurity or TechSupport, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_fiber_optic
        description: 1 if internet_service is Fiber optic, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_electronic_check
        description: 1 if payment_method is Electronic check, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_high_risk
        description: >
          Composite flag: 1 if customer is Month-to-month + Fiber optic + tenure < 12 months.
          Identifies primary intervention targets for retention campaigns.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: monthly_charges_bucket
        description: >
          Monthly charges bucketed into 6 bands capturing the non-linear churn relationship.
          The $70-90 (mid_high) band churns most; low (<$30) and very_high (>=$100) churn less.
          Bands: low / mid_low / mid / mid_high / high / very_high.
        tests:
          - not_null
          - accepted_values:
              values: ['low', 'mid_low', 'mid', 'mid_high', 'high', 'very_high']

      - name: services_per_dollar
        description: >
          service_count divided by monthly_charges. Measures add-on density per dollar spent.
          High ratio = good perceived value = lower churn propensity.
          NULL when monthly_charges = 0.

      - name: tenure_contract_segment
        description: >
          Crossed categorical combining tenure_group and contract_type into a single label,
          e.g. 'M2M_0to12', '2yr_48plus'. Lets models treat the most dangerous combination
          as an atomic feature rather than learning the interaction implicitly.
        tests:
          - not_null

      - name: charges_diff
        description: >
          total_charges minus (monthly_charges × tenure_months). A negative value signals
          a billing anomaly or applied discount — customer paid less than rack rate,
          which correlates with promotional plans that are easier to cancel.
          NULL when total_charges is null (brand-new customers not yet billed).

      - name: is_total_charges_missing
        description: >
          1 when total_charges is null or zero, 0 otherwise. Identifies brand-new customers
          (tenure = 0 or 1 month) who have not been billed a full cycle — highest
          short-term churn risk cohort.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: tenure_decay
        description: >
          1.0 / (tenure_months + 1). Convex transform that captures the rapid non-linear
          drop in churn risk after the first 6 months. Especially valuable for
          Logistic Regression, which cannot fit this curve with a raw linear tenure term.
          Always non-null (denominator is at least 1).
        tests:
          - not_null

      - name: payment_friction
        description: >
          Interaction term: is_electronic_check × is_high_risk. Captures the compound
          churn profile of electronic-check payers who are simultaneously Month-to-month,
          Fiber optic, and within their first 12 months. Gives Logistic Regression an
          explicit handle on this interaction that it cannot discover from individual features.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
