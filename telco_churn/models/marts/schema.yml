version: 2

models:
  - name: fct_churn_features
    description: >
      Final feature mart for the Kaggle S6E3 churn prediction model.
      One row per customer, all features present and ML-ready.
      This is the single source of truth consumed by notebooks/churn_prediction.ipynb.
      All feature engineering is in SQL (int_churn_features); the notebook only
      encodes categoricals and fits models.
    columns:
      # ------------------------------------------------------------------ #
      # Identifiers
      # ------------------------------------------------------------------ #
      - name: customer_id
        description: Row identifier — drop before modeling
        tests:
          - not_null
          - unique

      # ------------------------------------------------------------------ #
      # Demographics
      # ------------------------------------------------------------------ #
      - name: gender
        description: Customer gender — Male or Female
        tests:
          - not_null
          - accepted_values:
              values: ["Male", "Female"]

      - name: is_senior_citizen
        description: 1 if the customer is a senior citizen, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_partner
        description: 1 if the customer has a partner, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_dependents
        description: 1 if the customer has dependents, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      # ------------------------------------------------------------------ #
      # Account features
      # ------------------------------------------------------------------ #
      - name: tenure_months
        description: Number of months the customer has been with the company (0–72)
        tests:
          - not_null

      - name: contract_type
        description: Contract term — Month-to-month / One year / Two year
        tests:
          - not_null
          - accepted_values:
              values: ["Month-to-month", "One year", "Two year"]

      - name: has_paperless_billing
        description: 1 if customer uses paperless billing, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: payment_method
        description: Payment method used by the customer
        tests:
          - not_null
          - accepted_values:
              values:
                - "Electronic check"
                - "Mailed check"
                - "Bank transfer (automatic)"
                - "Credit card (automatic)"

      - name: monthly_charges
        description: Monthly billing amount in USD
        tests:
          - not_null

      - name: total_charges
        description: Total amount billed. NULL when tenure_months = 0.

      # ------------------------------------------------------------------ #
      # Phone features
      # ------------------------------------------------------------------ #
      - name: has_phone_service
        description: 1 if customer has phone service, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_multiple_lines
        description: 1 if customer has multiple phone lines, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      # ------------------------------------------------------------------ #
      # Internet service
      # ------------------------------------------------------------------ #
      - name: internet_service
        description: Internet service type — DSL / Fiber optic / No
        tests:
          - not_null
          - accepted_values:
              values: ["DSL", "Fiber optic", "No"]

      - name: has_online_security
        description: 1 if customer has online security add-on, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_online_backup
        description: 1 if customer has online backup add-on, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_device_protection
        description: 1 if customer has device protection add-on, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_tech_support
        description: 1 if customer has tech support add-on, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_streaming_tv
        description: 1 if customer subscribes to streaming TV, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_streaming_movies
        description: 1 if customer subscribes to streaming movies, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      # ------------------------------------------------------------------ #
      # Engineered features (SQL-defined, business logic in int_churn_features)
      # ------------------------------------------------------------------ #
      - name: tenure_group
        description: Tenure cohort — 0-12 mo / 12-24 mo / 24-48 mo / 48+ mo
        tests:
          - not_null
          - accepted_values:
              values: ["0-12 mo", "12-24 mo", "24-48 mo", "48+ mo"]

      - name: contract_risk_score
        description: Ordinal commitment score — 3 (Month-to-month) / 2 (One year) / 1 (Two year)
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3]

      - name: charges_ratio
        description: monthly_charges / tenure_months. NULL when tenure_months = 0.

      - name: service_count
        description: Count of internet add-on services subscribed (0–6)
        tests:
          - not_null

      - name: has_any_streaming
        description: 1 if customer has StreamingTV or StreamingMovies, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: has_any_security
        description: 1 if customer has OnlineSecurity or TechSupport, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_fiber_optic
        description: 1 if internet_service is Fiber optic, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_electronic_check
        description: 1 if payment_method is Electronic check, 0 otherwise
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_high_risk
        description: >
          Composite flag — 1 if Month-to-month + Fiber optic + tenure < 12 months.
          Primary intervention targets for retention campaigns.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      # ------------------------------------------------------------------ #
      # Target
      # ------------------------------------------------------------------ #
      - name: churn
        description: "TARGET — 1 if customer churned, 0 if retained"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
