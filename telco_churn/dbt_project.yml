name: telco_churn
version: "1.0.0"
config-version: 2

profile: telco_churn

# dbt looks for models in this directory (relative to dbt_project.yml)
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Path to raw CSV files — relative to the directory where `dbt run` is invoked.
  # Run dbt from kaggle_competition/ with:
  #   dbt run --project-dir telco_churn --profiles-dir .
  raw_data_path: "data/raw"

models:
  telco_churn:
    staging:
      +materialized: table
      +schema: staging

    intermediate:
      +materialized: table
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts
